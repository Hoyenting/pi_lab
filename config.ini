# Pi Lab environment monitor configuration
# Lines starting with # or ; are ignored.
# Environment variables override values in this file.

[thresholds]
temp_warning    = 30.0
temp_critical   = 40.0
humidity_warning  = 80.0
humidity_critical = 90.0

[logging]
log_file         = logs/monitor.log
sel_file         = logs/sel.log
console_interval = 20

[uart]
uart_device = /dev/ttyAMA0
uart_baud   = 115200

[http]
http_port = 8080
